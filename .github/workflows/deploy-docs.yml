name: Deploy Docs

on:
  push:
    branches:
      - main
      - 'v[0-9]+.[0-9]+'
    # No paths filter: a new vX.Y branch is created at an existing commit (no
    # changed paths), so a path filter would skip its first deploy. Deploys are
    # idempotent, so redeploying main on unrelated pushes is harmless.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (unstable, or vX.Y). Leave empty to derive from branch.'
        required: false
      core_ref:
        description: 'Core ref to build API docs from (branch/tag/SHA). Leave empty to auto-select.'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CORE_REPO: ConcordLib/Core
  CORE_DEFAULT_REF: main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs
        uses: actions/checkout@v4

      - name: Detect Worker changes
        id: worker_changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=true
          elif git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null || git fetch --no-tags --depth=1 origin "$BEFORE_SHA"; then
            if git diff --quiet "$BEFORE_SHA" "$GITHUB_SHA" -- \
              worker/src \
              worker/wrangler.jsonc \
              worker/package.json \
              worker/package-lock.json \
              worker/tsconfig.json; then
              CHANGED=false
            else
              CHANGED=true
            fi
          else
            echo "::warning::Could not load the previous commit; deploying the Worker to be safe."
            CHANGED=true
          fi

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Worker files changed: $CHANGED"

      - name: Determine version
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "$BRANCH" = "main" ]; then
            VERSION="unstable"
          else
            VERSION="$BRANCH"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying as: $VERSION"

      - name: Determine Core ref
        id: core
        run: |
          if [ -n "${{ github.event.inputs.core_ref }}" ]; then
            REF="${{ github.event.inputs.core_ref }}"
          elif [ "${{ steps.version.outputs.version }}" = "unstable" ]; then
            REF="${CORE_DEFAULT_REF}"
          else
            REF="${{ steps.version.outputs.version }}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Requested Core ref: $REF"

      - name: Checkout Core source
        id: core_checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ env.CORE_REPO }}
          ref: ${{ steps.core.outputs.ref }}
          token: ${{ secrets.CORE_CHECKOUT_TOKEN }}
          path: .core
          fetch-depth: 0

      - name: Checkout Core source (fallback to default ref)
        if: steps.core_checkout.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPO }}
          ref: ${{ env.CORE_DEFAULT_REF }}
          token: ${{ secrets.CORE_CHECKOUT_TOKEN }}
          path: .core
          fetch-depth: 0

      - name: Stage Core source for docfx metadata
        run: |
          if [ -d .core/src ]; then
            rm -rf src
            cp -a .core/src src
            # Root MSBuild inputs the src projects import while walking up the tree.
            for f in Directory.Build.props Directory.Build.targets Directory.Packages.props StyleCop.props stylecop.json global.json .editorconfig; do
              [ -f ".core/$f" ] && cp -a ".core/$f" "$f"
            done
            echo "Staged Core src/ from ref: ${{ steps.core.outputs.ref }} (fallback outcome: ${{ steps.core_checkout.outcome }})"
          else
            echo "::warning::.core/src not found; API metadata will be empty."
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Resolve API metadata cache key
        id: metadata_cache_key
        env:
          DOCFX_CONFIG_HASH: ${{ hashFiles('docfx.json') }}
        run: |
          CORE_SHA=$(git -C .core rev-parse HEAD)
          DOCFX_VERSION=$(docfx --version)
          echo "key=docfx-api-${RUNNER_OS}-${CORE_SHA}-${DOCFX_VERSION}-${DOCFX_CONFIG_HASH}" >> "$GITHUB_OUTPUT"

      - name: Restore API metadata cache
        id: api_metadata_cache
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: api
          key: ${{ steps.metadata_cache_key.outputs.key }}

      - name: Build API metadata
        id: api_metadata
        if: steps.api_metadata_cache.outputs.cache-hit != 'true'
        run: docfx metadata docfx.json
        continue-on-error: true

      - name: Save API metadata cache
        if: steps.api_metadata_cache.outputs.cache-hit != 'true' && steps.api_metadata.outcome == 'success'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: api
          key: ${{ steps.metadata_cache_key.outputs.key }}

      - name: Build docs
        run: docfx build docfx.json

      - name: Compute latest version branch
        id: latest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # The highest vX.Y branch on the repo is the canonical `latest`.
          LATEST=$(python3 worker/scripts/latest-version.py)
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Highest version branch: ${LATEST:-<none>}"

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes rclone

      - name: Install Worker dependencies
        if: steps.worker_changes.outputs.changed == 'true'
        working-directory: worker
        run: npm ci --ignore-scripts

      - name: Upload docs to R2
        env:
          VERSION: ${{ steps.version.outputs.version }}
          LATEST: ${{ steps.latest.outputs.latest }}
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_REGION: auto
        run: |
          RCLONE_FLAGS=(
            --checksum
            --fast-list
            --transfers 16
            --checkers 16
            --delete-after
            --s3-no-check-bucket
            --stats 30s
            --stats-one-line
          )

          rclone sync .site "r2:concord-docs/$VERSION" "${RCLONE_FLAGS[@]}"

          # Mirror to `latest` when this deploy IS the highest version branch.
          if [ -n "$LATEST" ] && [ "$VERSION" = "$LATEST" ]; then
            rclone sync .site "r2:concord-docs/latest" "${RCLONE_FLAGS[@]}"
          fi

      - name: Update version manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
          LATEST: ${{ steps.latest.outputs.latest }}
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_REGION: auto
        run: |
          python3 worker/scripts/build-versions.py --output "$RUNNER_TEMP/versions.json"

          rclone copyto "$RUNNER_TEMP/versions.json" "r2:concord-docs/versions.json" \
            --checksum \
            --s3-no-check-bucket

      - name: Deploy Worker
        if: steps.worker_changes.outputs.changed == 'true'
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --no-install wrangler deploy
